version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: armenian-osint-db
    environment:
      POSTGRES_DB: armenian_osint
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./src/database/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    networks:
      - osint-network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis for Job Queue
  redis:
    image: redis:7-alpine
    container_name: armenian-osint-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - osint-network
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 3s
      retries: 5

  # Main Application
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: armenian-osint-app
    environment:
      NODE_ENV: production
      PORT: 3000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: armenian_osint
      DB_USER: postgres
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      # AI is DISABLED by default - set to 'true' to enable
      ENABLE_AI_SQL: ${ENABLE_AI_SQL:-false}
      # Only needed if ENABLE_AI_SQL=true
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      DEFAULT_LLM_PROVIDER: ${DEFAULT_LLM_PROVIDER:-openai}
      CORS_ORIGIN: "*"
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - osint-network
    restart: unless-stopped

  # Scraper Worker
  scraper:
    build:
      context: ./scraper
      dockerfile: Dockerfile
    container_name: armenian-osint-scraper
    environment:
      NODE_ENV: production
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: armenian_osint
      DB_USER: postgres
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      CONCURRENT_JOBS: 2
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - osint-network
    restart: unless-stopped

networks:
  osint-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
