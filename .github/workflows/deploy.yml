name: Deploy to Cloudflare

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ──────────────────────────────────────────
  # Deploy Pages (frontend + API functions)
  # ──────────────────────────────────────────
  deploy-pages:
    name: Deploy Pages
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Deploy to Cloudflare Pages (main → production)
        if: github.ref == 'refs/heads/main'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler pages deploy public --project-name=armdata --branch=main

      - name: Deploy to Cloudflare Pages (PR → preview)
        if: github.event_name == 'pull_request'
        id: pages-pr
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          URL=$(npx wrangler pages deploy public --project-name=armdata 2>&1 | grep -oP 'https://[^\s]+\.pages\.dev' | tail -1)
          echo "deployment-url=$URL" >> "$GITHUB_OUTPUT"

      - name: Comment preview URL on PR
        if: github.event_name == 'pull_request' && steps.pages-pr.outputs.deployment-url != ''
        uses: actions/github-script@v7
        with:
          script: |
            const url = '${{ steps.pages-pr.outputs.deployment-url }}'
            if (!url) return
            const body = `## 🚀 Preview Deployment\n\n**URL:** ${url}\n\n*Deployed from commit \`${{ github.sha }}\`*`
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            })

  # ──────────────────────────────────────────
  # Run D1 migrations (main branch only)
  # ──────────────────────────────────────────
  migrate-db:
    name: Migrate D1 Database
    runs-on: ubuntu-latest
    needs: deploy-pages
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install wrangler
        run: npm install wrangler --save-dev

      # ── Original schema migrations (idempotent — IF NOT EXISTS) ──
      - name: Run schema migration
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler d1 execute armdata-db --remote --file=migrations/0001_schema.sql

      - name: Run security migration
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler d1 execute armdata-db --remote --file=migrations/0002_security.sql

      - name: Run statistics unique index migration
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler d1 execute armdata-db --remote --file=migrations/0004_statistics_unique.sql

      - name: Run AI pipeline migration
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler d1 execute armdata-db --remote --file=migrations/0006_ai_pipeline.sql

      - name: Run companies unique index migration
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler d1 execute armdata-db --remote --file=migrations/0005_companies_unique.sql

      - name: Run extended data tables migration
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler d1 execute armdata-db --remote --file=migrations/0007_extended_data.sql

      - name: Seed Armenia facts
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler d1 execute armdata-db --remote --file=migrations/0008_facts_seed.sql

      - name: Expand statistics unique index to include region
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler d1 execute armdata-db --remote --file=migrations/0010_statistics_region_unique.sql

      - name: Seed demographic data
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler d1 execute armdata-db --remote --file=migrations/0009_demographic_seed.sql

      - name: Create market_data table
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler d1 execute armdata-db --remote --file=migrations/0011_market_data.sql

      - name: Seed production data (idempotent)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler d1 execute armdata-db --remote --file=migrations/0003_seed.sql

      # ── New unified data layer migrations ──────────────────────
      - name: Create data_points + entities tables
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler d1 execute armdata-db --remote --file=migrations/0012_data_points.sql

      - name: Migrate existing data into data_points + entities
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler d1 execute armdata-db --remote --file=migrations/0013_migrate_data.sql

      - name: Create query_cache table
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler d1 execute armdata-db --remote --file=migrations/0014_query_cache.sql

      - name: Create scraper_jobs table (idempotent)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler d1 execute armdata-db --remote --file=migrations/0015_admin_seed.sql

      # ── Seed default admin from secrets ───────────────────────
      - name: Seed default admin user (idempotent)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          DEPLOY_URL: ${{ secrets.DEPLOY_URL }}
        run: |
          if [ -n "$DEPLOY_URL" ]; then
            curl -sf -X POST "$DEPLOY_URL/api/admin/seed" \
              -H "Content-Type: application/json" || echo "Admin seed skipped (already exists or endpoint not ready)"
          else
            echo "DEPLOY_URL not set, skipping admin seed — set it as a repo secret (e.g. https://armdata.pages.dev)"
          fi

  # ──────────────────────────────────────────
  # Deploy scraper Worker (main branch only)
  # ──────────────────────────────────────────
  deploy-scraper:
    name: Deploy Scraper Worker
    runs-on: ubuntu-latest
    needs: deploy-pages
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install scraper dependencies
        run: npm install
        working-directory: scraper-cf

      - name: Deploy scraper worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        working-directory: scraper-cf
        run: npx wrangler deploy
