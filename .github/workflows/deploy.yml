name: Deploy to Cloudflare

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ──────────────────────────────────────────
  # Deploy Pages (frontend + API functions)
  # ──────────────────────────────────────────
  deploy-pages:
    name: Deploy Pages
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Deploy to Cloudflare Pages (main → production)
        if: github.ref == 'refs/heads/main'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler pages deploy public --project-name=armdata --branch=main

      - name: Deploy to Cloudflare Pages (PR → preview)
        if: github.event_name == 'pull_request'
        id: pages-pr
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          URL=$(npx wrangler pages deploy public --project-name=armdata 2>&1 | grep -oP 'https://[^\s]+\.pages\.dev' | tail -1)
          echo "deployment-url=$URL" >> "$GITHUB_OUTPUT"

      - name: Comment preview URL on PR
        if: github.event_name == 'pull_request' && steps.pages-pr.outputs.deployment-url != ''
        uses: actions/github-script@v7
        with:
          script: |
            const url = '${{ steps.pages-pr.outputs.deployment-url }}'
            if (!url) return
            const body = `## 🚀 Preview Deployment\n\n**URL:** ${url}\n\n*Deployed from commit \`${{ github.sha }}\`*`
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            })

  # ──────────────────────────────────────────
  # Run D1 migrations (main branch only)
  # ──────────────────────────────────────────
  migrate-db:
    name: Migrate D1 Database
    runs-on: ubuntu-latest
    needs: deploy-pages
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install wrangler
        run: npm install wrangler --save-dev

      - name: Run schema migration
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler d1 execute armdata-db --remote --file=migrations/0001_schema.sql

      - name: Run security migration
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler d1 execute armdata-db --remote --file=migrations/0002_security.sql

  # ──────────────────────────────────────────
  # Deploy scraper Worker (main branch only)
  # ──────────────────────────────────────────
  deploy-scraper:
    name: Deploy Scraper Worker
    runs-on: ubuntu-latest
    needs: deploy-pages
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install scraper dependencies
        run: npm install
        working-directory: scraper-cf

      - name: Deploy scraper worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        working-directory: scraper-cf
        run: npx wrangler deploy
